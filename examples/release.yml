# release.yml
#
# PURPOSE: Build and publish a release when a version tag is pushed.
#
# USAGE: Copy this file into .github/workflows/ of your repo.
#        Runs only in the origin repo — no-op in forks.
#        Forks lack the publish credentials and should never cut releases.

name: Release

on:
  push:
    tags:
      - 'v*'

# Only run in the origin repo — no-op in forks.
if: github.event.repository.fork == false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: echo "Add your build steps here"

      - name: Publish
        run: echo "Add your publish steps here (e.g. npm publish, gh release create)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
